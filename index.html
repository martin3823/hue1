<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 1. Màn hình khởi đầu */
    #ui-container, #end-overlay {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; transition: 0.5s;
    }
    #ui-container { background: rgba(0, 0, 0, 0.9); }
    
    /* 2. Lớp phủ kết thúc (Mờ & Giảm sáng) */
    #end-overlay { 
      background: rgba(0, 0, 0, 0.6); 
      backdrop-filter: blur(8px); /* Tạo hiệu ứng mờ ảo */
      display: none; 
    }

    button {
      padding: 15px 35px; margin: 10px; font-size: 16px; font-weight: bold;
      border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase;
    }
    #start-btn { background: #ff3b30; color: white; box-shadow: 0 4px 15px rgba(255,59,48,0.4); }
    #continue-btn { background: #34c759; color: white; }
    #back-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid white; }
  </style>
</head>

<body>

  <div id="ui-container">
    <h2 style="color:white; font-family: sans-serif; margin-bottom: 20px;">DAP EXPERIENCE</h2>
    <button id="start-btn">CHẠM ĐỂ KHÁM PHÁ</button>
  </div>

  <div id="end-overlay">
    <button id="continue-btn">Tiếp tục trải nghiệm</button>
    <button id="back-btn">Quay lại trang chủ</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 10;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
  >

    <a-assets>
      <video id="video" crossorigin="anonymous" src="./video.mp4" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video src="#video" width="1.02" height="0.612" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#video');
      const uiContainer = document.querySelector('#ui-container');
      const endOverlay = document.querySelector('#end-overlay');
      const target = document.querySelector('#target');
      
      let playCount = 0;

      // KÍCH HOẠT TẤT CẢ TRONG 1 CLICK
      document.querySelector('#start-btn').addEventListener('click', () => {
        // 1. Chạy hệ thống MindAR (Hỏi quyền Camera lúc này)
        sceneEl.systems["mindar-image-system"].start();
        // 2. Mở khóa âm thanh
        video.play(); video.pause();
        // 3. Ẩn UI
        uiContainer.style.opacity = '0';
        setTimeout(() => { uiContainer.style.display = 'none'; }, 500);
      });

      target.addEventListener("targetFound", () => { video.play(); });
      target.addEventListener("targetLost", () => { video.pause(); });

      // LOGIC KẾT THÚC LẦN 2
      video.addEventListener('ended', () => {
        playCount++;
        if (playCount < 2) {
          video.play();
        } else {
          // Hiện Overlay kết thúc
          endOverlay.style.display = 'flex';
          // Giảm âm lượng 50%
          video.volume = 0.5;
          // Cho phép video tiếp tục lặp ngầm
          video.loop = true;
          video.play();
        }
      });

      // Nút Tiếp tục: Trả lại mọi thứ bình thường
      document.querySelector('#continue-btn').addEventListener('click', () => {
        endOverlay.style.display = 'none';
        video.volume = 1.0;
        playCount = 1; // Reset nhẹ để không hiện overlay ngay lập tức
      });

      // Nút Quay lại
      document.querySelector('#back-btn').addEventListener('click', () => {
        window.location.href = "https://your-landing-page.com";
      });
    });
  </script>
</body>
</html>
