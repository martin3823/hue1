<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    #ui-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.8); z-index: 9999;
      display: flex; justify-content: center; align-items: center;
    }
    #start-btn, #exit-btn {
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      color: white; border: none; border-radius: 8px; cursor: pointer;
    }
    #start-btn { background-color: #ff3b30; }
    
    /* Nút thoát ẩn lúc đầu */
    #exit-btn {
      position: absolute; bottom: 50px; left: 50%;
      transform: translateX(-50%); background-color: #444;
      display: none; z-index: 10000;
    }
  </style>
</head>

<body>

  <div id="ui-container">
    <button id="start-btn">CHẠM ĐỂ KHÁM PHÁ</button>
  </div>

  <button id="exit-btn">KẾT THÚC & THOÁT</button>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 10;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
  >

    <a-assets>
      <video id="video" crossorigin="anonymous" src="./video.mp4" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video src="#video" width="1.02" height="0.612" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const video = document.querySelector('#video');
      const uiContainer = document.querySelector('#ui-container');
      const startBtn = document.querySelector('#start-btn');
      const exitBtn = document.querySelector('#exit-btn');
      const target = document.querySelector('#target');

      let playCount = 0; // Biến đếm số lần phát

      // Bắt đầu
      startBtn.addEventListener('click', function() {
        video.play();
        video.pause(); 
        uiContainer.style.display = 'none';
      });

      // Xử lý khi quét trúng hình
      target.addEventListener("targetFound", event => {
        if (playCount < 2) {
          video.play();
        }
      });

      target.addEventListener("targetLost", event => {
        video.pause();
      });

      // Xử lý logic đếm lần phát và hiện nút thoát
      video.addEventListener('ended', function() {
        playCount++;
        if (playCount < 2) {
          video.play(); // Phát lại lần 2
        } else {
          exitBtn.style.display = 'block'; // Hiện nút thoát sau lần 2
        }
      });

      // Nút thoát (Ví dụ: Quay về trang chủ hoặc tải lại trang)
      exitBtn.addEventListener('click', function() {
        window.location.href = "https://your-landing-page.com"; 
        // Hoặc location.reload() để xem lại từ đầu
      });
    });
  </script>
</body>
</html>
